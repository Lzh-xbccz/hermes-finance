name: Hermes Finance
version: 1.0.0
schema: v1
mcpServers:
  - name: Hermes Finance
    command: python3
    args:
      - /absolute/path/to/hermes-finance/bin/hermes_finance_mcp.py
    cwd: /absolute/path/to/hermes-finance
    env:
      PYTHONPATH: /absolute/path/to/hermes-finance
    connectionTimeout: 20000
